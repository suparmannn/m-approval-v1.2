    <style>
        * {
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        
        .mobile-container {
    max-width: 428px;
    margin: 0 auto;
    /* Putih ditarik ke 100% biar gradasinya penuh sampai bawah container */
    background: linear-gradient(180deg, #D4E7FE 0%, #FFFFFF 100%);
    min-height: 100vh;
    position: relative;
    box-shadow: 0 0 20px rgba(0,0,0,0.1);
}
        
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
        }
        
        .notification-badge {
            position: absolute;
            top: -4px;
            right: -4px;
            background-color: #EF4444;
            color: white;
            border-radius: 9999px;
            min-width: 18px;
            height: 18px;
            font-size: 10px;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid white;
            line-height: 1;
        }

        .notification-badge-footer {
            position: absolute;
            top: -5px;
            right: -5px;
            width: 14px;
            height: 14px;
            background-color: #EF4444;
            border-radius: 9999px;
            border: 2.5px solid white;
            box-shadow: 0 1px 6px rgba(239, 68, 68, 0.4);
            animation: pulse-dot 2s infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.3); }
        }
        
        .status-card {
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .status-card:active {
            transform: scale(0.97);
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .notification-dropdown {
            animation: slideIn 0.3s ease;
        }
        
        .menu-item {
            transition: all 0.1s ease;
        }
        
        .menu-item:active {
            transform: scale(0.94);
        }

       /* 🌟 HEADRNYA SEKARANG TRANSPARAN & BUANG EFEK CEKUNGAN LAMA 🌟 */
        .livin-header-curve {
            position: relative;
            background-color: transparent; /* Dibikin transparan biar gradasi container keliatan */
        }
        /* Hapus atau komentari bagian .livin-header-curve::before dan ::after lu */
        .livin-header-curve::before,
        .livin-header-curve::after {
            display: none; 
        }
        .livin-header-curve::before {
            left: 0;
            border-radius: 24px 0 0 0;
            box-shadow: -12px -12px 0 12px #051651; 
        }
        .livin-header-curve::after {
            right: 0;
            border-radius: 0 24px 0 0;
            box-shadow: 12px -12px 0 12px #051651; /* Fix shadow arah kanan */
        }
        /* 🌟 RE-ADJUST UKURAN NOTCH BIAR PAS PADA CARD SLIM 🌟 */
/* 🌟 ADJUSTMENT LINGKARAN DI-GEDEIN TANPA GESER TEKS KANAN 🌟 */
.custom-notch {
    position: absolute;
    /* 1. Digeser agak keluar (ke kiri & bawah) biar space di dalam card tetep luas */
    bottom: -8px; 
    left: -8px;
    /* 2. Container luar dinaikin dikit aja dari 34px ke 38px */
    width: 50px;
    height: 50px;
    background: #f8fafc; 
    border-top-right-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    /* 3. Padding disesuaikan biar posisi angka tetep center saat digedein */
    padding-top: 5px;
    padding-right: 5px;
    z-index: 10;
}

.custom-notch::before {
    content: '';
    position: absolute;
    /* 4. Ring lingkaran dalem digedein signifikan (dari 24px ke 30px) */
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: transparent;
    z-index: 1;
}

.notch-orange::before { border: 4px solid #f97316; }
.notch-emerald::before { border: 4px solid #1d9605; }
.notch-red::before { border: 4px solid #b70a0a; }

.custom-notch span {
    position: relative;
    z-index: 2;
    line-height: 1;
}
/* Ketika button nav memiliki class active */
.bottom-nav-item.active {
    color: #38bdf8 !important; /* Warna biru muda langit (sky-400) */
}

/* Kasih efek glow menyala pada icon lucide nya */
.bottom-nav-item.active i {
    filter: drop-shadow(0 0 6px rgba(56, 189, 248, 0.8));
    stroke-width: 2.5; /* Bikin garis icon sedikit lebih tebal saat aktif */
}

/* Kasih efek glow tipis pada teks di bawah icon */
.bottom-nav-item.active span {
    font-weight: 700;
    text-shadow: 0 0 8px rgba(56, 189, 248, 0.5);
}
/* Warna nav pas lagi mati / ga di-klik */
.bottom-nav-item {
    color: #94a3b8; /* Abu-abu slate-400 */
    transition: all 0.2s ease;
}
    </style>

   function renderMenuGrid() {
        const menuGrid = document.getElementById('menuGrid');
        const visibleMenus = menus.slice(0, 12);
        menuGrid.innerHTML = visibleMenus.map(menu => {
            const totalPending = menu.pending + menu.urgent;
            return `
            <div class="menu-item flex flex-col items-center justify-center text-center gap-1.5 cubic-bezier w-full min-w-0" data-menu="${menu.id}">

                <span class="text-[9px] text-center text-bpr-dark font-semibold leading-tight break-words w-full px-0.5">${menu.name}</span>
            </div>`
        }).join('');
        lucide.createIcons();
        setupHomeMenuEvents();
    }

    function renderFilteredPendingModal() {
        const allMenuList = document.getElementById('allMenuList');
        const modalTitle = document.querySelector('#allMenuModal h3');
        if (modalTitle) modalTitle.innerText = "Menu Yang Membutuhkan Persetujuan";
        const pendingMenus = menus.filter(menu => (menu.pending + menu.urgent) > 0);
        if (pendingMenus.length === 0) {
            allMenuList.innerHTML = `<div class="col-span-4 text-center py-8"><p class="text-xs text-slate-400 font-medium">Tidak ada menu yang berstatus pending</p></div>`;
            return;
        }
        allMenuList.innerHTML = pendingMenus.map(menu => {
            const totalPending = menu.pending + menu.urgent;
            return `
                <div class="menu-item group flex flex-col items-center justify-center text-center gap-1.5 cursor-pointer py-1 w-full" data-menu-all="${menu.id}">
                    <div class="relative w-11 h-11 rounded-full bg-slate-50 flex items-center justify-center border border-slate-200 shadow-sm flex-shrink-0 transition-all duration-200 group-hover:bg-slate-100">
                        <i data-lucide="${menu.icon}" class="w-5 h-5 text-[#051651] stroke-[2.2]"></i>
                        <span class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] font-black w-5 h-5 rounded-full flex items-center justify-center shadow-sm ring-2 ring-white leading-none">${totalPending}</span>
                    </div>
                    <span class="text-[9px] text-center text-bpr-dark font-semibold leading-tight break-words w-full px-0.5">${menu.name}</span>
                </div>`;
        }).join('');
        lucide.createIcons();
        setupHomeMenuEvents();
    }   

    function updateStatistics() {
        const totalPendingFromMenus = menus.reduce((sum, menu) => sum + (menu.pending + menu.urgent), 0);
        document.getElementById('pendingCount').innerText = totalPendingFromMenus;
        document.getElementById('rejectedCount').innerText = statsData.rejected;
        document.getElementById('approvedCount').innerText = statsData.approved;
    }
    
    function updateGreetingAndTime() {
        const now = new Date();
        const hours = now.getHours();
        let greeting = hours >= 5 && hours < 12 ? 'Selamat Pagi' : (hours >= 12 && hours < 15 ? 'Selamat Siang' : (hours >= 15 && hours < 18 ? 'Selamat Sore' : 'Selamat Malam'));
        document.getElementById('greetingText').innerHTML = `${greeting},`;
        document.getElementById('userName').innerText = currentUser.name;
        document.getElementById('currentTime').innerText = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
        document.getElementById('currentDate').innerText = now.toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' });
    }
    
    function updateNotificationBell() {
        const unreadCount = notifications.filter(n => !n.read).length;
        const bellBadge = document.getElementById('notificationCount');
        const bottomBadge = document.getElementById('bottomNotifBadge');
        const notificationList = document.getElementById('notificationList');
        
        if (unreadCount > 0) {
            bellBadge.style.display = 'flex'; bellBadge.innerText = unreadCount; bottomBadge.style.display = 'flex';
        } else {
            bellBadge.style.display = 'none'; bottomBadge.style.display = 'none';
        }
        
        if (notificationList && notifications.length > 0) {
            let html = '';
            notifications.forEach(notif => {
                html += `
                    <div class="p-3 hover:bg-gray-50 cursor-pointer ${!notif.read ? 'bg-amber-50/50' : ''}" data-notif-id="${notif.id}" onclick="window.location.href='list-notif.html'">
                        <div class="flex gap-2">
                            <i data-lucide="bell" class="w-4 h-4 text-[#051651] shrink-0 mt-0.5"></i>
                            <div class="flex-1 min-w-0">
                                <p class="text-xs font-bold text-slate-800">${notif.title}</p>
                                <p class="text-[11px] text-slate-500 truncate mt-0.5">${notif.message}</p>
                                <p class="text-[9px] text-slate-400 mt-1">${notif.time}</p>
                            </div>
                            ${!notif.read ? '<div class="w-2 h-2 bg-amber-400 rounded-full shrink-0 mt-1.5"></div>' : ''}
                        </div>
                    </div>`;
            });
            notificationList.innerHTML = html;
            if (typeof lucide !== 'undefined') lucide.createIcons();
        }
    }
    
    let isNotificationOpen = false;
    document.getElementById('notificationBell').addEventListener('click', (e) => {
        e.stopPropagation(); updateNotificationBell();
        const dropdown = document.getElementById('notificationDropdown');
        isNotificationOpen = !isNotificationOpen; dropdown.style.display = isNotificationOpen ? 'block' : 'none';
    });
    
    document.addEventListener('click', (e) => {
        const dropdown = document.getElementById('notificationDropdown'); const bell = document.getElementById('notificationBell');
        if (!bell?.contains(e.target) && dropdown?.style.display === 'block') { dropdown.style.display = 'none'; isNotificationOpen = false; }
    });
    
    document.getElementById('showAllMenuBtn')?.addEventListener('click', () => { renderAllMenuModal(); document.getElementById('allMenuModal').style.display = 'flex'; });
    document.getElementById('closeMenuModal')?.addEventListener('click', () => { document.getElementById('allMenuModal').style.display = 'none'; });
    
    document.querySelectorAll('[data-nav]').forEach(btn => {
        btn.addEventListener('click', (e) => {
            const nav = e.currentTarget.dataset.nav;
            if (nav === 'home') return;
            else if (nav === 'notification') document.getElementById('notificationBell').click();
            else if (nav === 'profile') alert(`👤 John Doe\nFitur profil segera hadir`);
        });
    });
    document.getElementById('bottomNotificationBtn')?.addEventListener('click', () => { window.location.href = 'list-notif.html'; });
    function markAllNotificationsAsRead() { notifications.forEach(notif => { notif.read = true; }); updateNotificationBell(); }
    document.getElementById('markAllReadBtn')?.addEventListener('click', (e) => { e.stopPropagation(); markAllNotificationsAsRead(); });
    document.getElementById('pendingCard')?.addEventListener('click', () => { renderFilteredPendingModal(); document.getElementById('allMenuModal').style.display = 'flex'; });
    document.getElementById('showAllMenuBtn')?.addEventListener('click', () => {
        const modalTitle = document.querySelector('#allMenuModal h3'); if (modalTitle) modalTitle.innerText = "Semua Menu Approval"; 
        renderAllMenuModal(); document.getElementById('allMenuModal').style.display = 'flex';
    });

    setInterval(updateGreetingAndTime, 1000);
    updateGreetingAndTime(); updateStatistics(); renderMenuGrid(); updateNotificationBell();
</script>
</body>
</html>
